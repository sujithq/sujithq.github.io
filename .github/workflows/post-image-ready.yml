name: post-image-ready

on:
  workflow_run:
    workflows:
      - generate-image
    types:
      - completed

jobs:
  validate-covers:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Validate changed posts have cover images
        run: |
          BASE_BRANCH="${{ github.event.repository.default_branch }}"
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"

          git fetch origin "$BASE_BRANCH" --depth=1

          git diff --name-only "origin/${BASE_BRANCH}...${HEAD_SHA}" -- 'content/posts/**/index.md' > changed-posts.txt

          if [ ! -s changed-posts.txt ]; then
            echo "No changed post index files for this workflow run."
            exit 0
          fi

          MISSING=0
          while IFS= read -r INDEX_FILE; do
            [ -z "$INDEX_FILE" ] && continue

            COVER_FILE="$(dirname "$INDEX_FILE")/cover.jpg"
            if [ ! -f "$COVER_FILE" ]; then
              echo "Missing required cover image: $COVER_FILE"
              MISSING=1
            fi
          done < changed-posts.txt

          if [ "$MISSING" -ne 0 ]; then
            echo "One or more changed posts are missing cover.jpg"
            exit 1
          fi

          echo "All changed posts have cover.jpg"
