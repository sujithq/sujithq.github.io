name: "Copilot Setup Steps"

# Allow testing of the setup steps from your repository's "Actions" tab.
on: workflow_dispatch

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-24.04 # ubuntu-latest

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # If you want to clone the repository as part of your setup steps, for example to install dependencies, you'll need the `contents: read` permission. If you don't clone the repository in your setup steps, Copilot will do this for you automatically after the steps complete.
      contents: write
      id-token: write

    # You can define any steps you want, and they will run before the agent starts.
    # If you do not check out your code, Copilot will do this for you.
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache Hugo resources
        uses: actions/cache@v5
        env:
            cache-name: cache-hugo-resources
        with:
            path: resources
            key: ${{ env.cache-name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
            go-version: "^1.23.3"

      - name: Check Go version
        run: go version

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install create-image dependencies
        run: pip install -r .github/copilot-setup-requirements.txt

      - name: Ensure Azure CLI is available
        run: |
          if command -v az >/dev/null 2>&1; then
            az version
          else
            sudo apt-get update
            sudo apt-get install -y azure-cli
            az version
          fi

      - name: Azure login (if Copilot env credentials are set)
        if: (vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID) && (vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID) && (vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
            hugo-version: "0.148.2"
            extended: true

      - name: Install JavaScript dependencies
        run: npm ci
