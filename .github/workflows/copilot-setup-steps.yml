name: "Copilot Setup Steps"

# Allow testing of the setup steps from your repository's "Actions" tab.
on: workflow_dispatch

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-24.04 # ubuntu-latest
    env:
      # Hardcoded non-sensitive Azure identifiers — safe to commit, required for cloud-agent runs
      # which do not receive Actions secrets or repository variables.
      AZURE_CLIENT_ID: 2d9952c6-0a40-4dc1-bc60-e1bd069e11fd # ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: 2dfe981e-73de-4774-96bf-57b42ca243d8 # ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: 27ab9d9b-03ae-4560-9e84-16cfc5dbfb08 # ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
      FOUNDRY_ENDPOINT: https://squintelier-5556-resource.services.ai.azure.com/

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # If you want to clone the repository as part of your setup steps, for example to install dependencies, you'll need the `contents: read` permission. If you don't clone the repository in your setup steps, Copilot will do this for you automatically after the steps complete.
      contents: write
      id-token: write

    # You can define any steps you want, and they will run before the agent starts.
    # If you do not check out your code, Copilot will do this for you.
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache Hugo resources
        uses: actions/cache@v5
        env:
            cache-name: cache-hugo-resources
        with:
            path: resources
            key: ${{ env.cache-name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
            go-version: "^1.23.3"

      - name: Check Go version
        run: go version

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip openai azure-identity

      - name: Show Azure config source availability
        shell: bash
        env:
          VAR_AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          VAR_AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          VAR_AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          SEC_AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          SEC_AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          SEC_AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail

          if [ -n "${VAR_AZURE_CLIENT_ID:-}" ]; then echo "AZURE_CLIENT_ID source: vars"; fi
          if [ -n "${SEC_AZURE_CLIENT_ID:-}" ]; then echo "AZURE_CLIENT_ID source: secrets"; fi

          if [ -n "${VAR_AZURE_TENANT_ID:-}" ]; then echo "AZURE_TENANT_ID source: vars"; fi
          if [ -n "${SEC_AZURE_TENANT_ID:-}" ]; then echo "AZURE_TENANT_ID source: secrets"; fi

          if [ -n "${VAR_AZURE_SUBSCRIPTION_ID:-}" ]; then echo "AZURE_SUBSCRIPTION_ID source: vars"; fi
          if [ -n "${SEC_AZURE_SUBSCRIPTION_ID:-}" ]; then echo "AZURE_SUBSCRIPTION_ID source: secrets"; fi

      - name: Validate Azure auth inputs
        shell: bash
        run: |
          set -euo pipefail
          missing=0

          if [ -z "${AZURE_CLIENT_ID:-}" ]; then
            echo "::error::Missing AZURE_CLIENT_ID"
            missing=1
          fi

          if [ -z "${AZURE_TENANT_ID:-}" ]; then
            echo "::error::Missing AZURE_TENANT_ID"
            missing=1
          fi

          if [ -z "${AZURE_SUBSCRIPTION_ID:-}" ]; then
            echo "::error::Missing AZURE_SUBSCRIPTION_ID"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo "::error::Azure OIDC preflight failed. Set AZURE_CLIENT_ID, AZURE_TENANT_ID, and AZURE_SUBSCRIPTION_ID as repository variables (preferred) or Actions secrets."
            exit 1
          fi

          echo "Azure auth input preflight passed."

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Azure session
        shell: bash
        run: |
          set -euo pipefail
          az account show 1>/dev/null
          echo "Azure OIDC login succeeded."

      - name: Validate Foundry token access
        shell: bash
        run: |
          set -euo pipefail
          token=$(az account get-access-token --resource https://cognitiveservices.azure.com/ --query accessToken -o tsv)
          if [ -z "$token" ]; then
            echo "::error::Unable to acquire Azure AI token for Foundry resource scope."
            exit 1
          fi
          echo "Foundry token preflight succeeded for ${FOUNDRY_ENDPOINT}."

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
            hugo-version: "0.147.3"
            extended: true

      - name: Install JavaScript dependencies
        run: npm ci
