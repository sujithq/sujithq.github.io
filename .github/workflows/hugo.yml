name: Deploy to Github Pages

on:
  schedule:
    - cron: '0 2 * * *'
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_run:
    workflows: ["Publish due posts"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_prod_local_health:
        description: 'Run Playwright local production health-check (Windows)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  DOTNET_VERSION: '10.0.x'   # <= set once; eg '9.0.x' or '10.0.x'
  GO_VERSION: '1.26.x'
  NODE_VERSION: '24'
  HUGO_VERSION: '0.160.1'




jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      id-token: write   # REQUIRED for OIDC

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache Hugo resources
        uses: actions/cache@v5
        env:
          cache-name: cache-hugo-resources
        with:
          path: resources
          key: ${{ env.cache-name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check Go version
        run: go version

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install npm dependencies
        run: |
          $PSVersionTable
          npm install
        shell: pwsh

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Compute .NET TFM and OUTDIR
        id: tfm
        shell: bash
        run: |
          # From DOTNET_VERSION like "10.0.x" -> "10.0"
          VER="${DOTNET_VERSION%.x}"
          echo "VER=$VER"
          TFM="net${VER}"
          echo "DOTNET_TFM=$TFM" >> "$GITHUB_ENV"
          echo "OUTDIR=src/Crawler/bin/Release/$TFM" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore src/Crawler/Crawler.csproj

      - name: Build
        run: dotnet build src/Crawler/Crawler.csproj -c Release --no-restore

      - name: Run crawler and sync artifacts
        id: crawler
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
          FOUNDRY_API_KEY: ${{ secrets.FOUNDRY_API_KEY }}
        shell: bash
        run: |
          set -Eeuo pipefail
          set -x

          echo "DOTNET_TFM=${DOTNET_TFM}"
          echo "OUTDIR=${OUTDIR}"

          # Publish to a clean OUTDIR so working dir + outputs are deterministic
          rm -rf "${OUTDIR}"
          dotnet publish src/Crawler/Crawler.csproj -c Release -o "${OUTDIR}"

          echo "::group::Published OUTDIR contents"
          ls -la "${OUTDIR}"
          echo "::endgroup::"

          # Run the app from OUTDIR so it writes to OUTDIR/db and OUTDIR/state
          pushd "${OUTDIR}"
          if [ -f "./Crawler" ]; then
            ./Crawler
          else
            dotnet Crawler.dll
          fi
          popd

          echo "::group::OUTDIR tree after run"
          ls -laR "${OUTDIR}" || true
          echo "::endgroup::"

          # Copy db/state back to repo root with clear logs
          mkdir -p db state
          for d in db state; do
            if [ -d "${OUTDIR}/${d}" ]; then
              echo "Syncing ${OUTDIR}/${d} -> ./${d}"
              rsync -av "${OUTDIR}/${d}/" "./${d}/"
            else
              echo "No ${d} to copy from ${OUTDIR}"
            fi
          done

          echo "::group::Repo db/ tree"
          ls -laR db || true
          echo "::endgroup::"
          echo "::group::Repo state/ tree"
          ls -laR state || true
          echo "::endgroup::"

      - name: Report crawler failure
        if: ${{ always() && steps.crawler.outcome == 'failure' }}
        shell: bash
        run: |
          message="Crawler failed, but the workflow will continue with the last available generated data."
          echo "::warning::${message}"
          {
            echo "## Crawler warning"
            echo
            echo "${message}"
          } >> "$GITHUB_STEP_SUMMARY"


      - name: Build Update pages
        run: npm run sync-updates

      - name: Build
        if: always()
        run: hugo --minify --gc --environment production


      - name: Upload site artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: public


      - name: Commit & push results
        if: |
          github.event_name == 'push' && github.ref == 'refs/heads/main' ||
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git pull --rebase --autostash origin main || true
          git add db/ content/ state/ reports/
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore: update crawl outputs [skip ci]"
          if git push; then
            echo "Pushed successfully."
          else
            echo "Push rejected, attempting rebase and retry..."
            git fetch origin main
            if git rebase origin/main; then
              git push || git push --force-with-lease
            else
              echo "Rebase had conflicts; aborting and using --force-with-lease to publish bot outputs."
              git rebase --abort || true
              git push --force-with-lease
            fi
          fi

      # - name: Deploy 🚀
      #   if: |
      #     github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      #     github.event_name == 'schedule' ||
      #     github.event_name == 'workflow_dispatch'
      #   uses: JamesIves/github-pages-deploy-action@v4
      #   with:
      #     branch: gh-pages
      #     folder: public
      #     clean: true
      #     single-commit: true


  prod_local_health:
    if: ${{ vars.RUN_PROD_LOCAL_HEALTH == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_prod_local_health == 'true') }}
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Run local production health-check
        run: npm run test:prod-local-health


  deploy_prod:
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:

      - name: Checkout repo
        uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: site
          path: public

      - name: Deploy 🚀 (prod)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          clean: true
          single-commit: true

  deploy_pr:
    needs: build
    runs-on: ubuntu-latest
    # IMPORTANT: Only deploy for PRs coming from the same repo (not forks),
    # otherwise secrets (PAT) are not available on pull_request.
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false   # 🔴 THIS IS CRITICAL


      - uses: actions/download-artifact@v8
        with:
          name: site
          path: public

      - name: Deploy 🚀 (PR preview -> dev repo)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.PAT_DEV_PAGES }}
          repository-name: sujithq/sujithq.github.io.dev
          branch: gh-pages
          folder: public
          clean: true
          single-commit: true